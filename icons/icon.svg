<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#0f1115"/>
  <g stroke="#4ade80" stroke-width="24" stroke-linecap="round" fill="none">
    <!-- plus (top-left) -->
    <line x1="132" y1="176" x2="220" y2="176"/>
    <line x1="176" y1="132" x2="176" y2="220"/>
    <!-- minus (top-right) -->
    <line x1="292" y1="176" x2="380" y2="176"/>
    <!-- times (bottom-left) -->
    <line x1="145" y1="305" x2="207" y2="367"/>
    <line x1="207" y1="305" x2="145" y2="367"/>
  </g>
  <!-- divide (bottom-right) -->
  <g fill="#4ade80">
    <circle cx="336" cy="306" r="15"/>
    <circle cx="336" cy="366" r="15"/>
  </g>
  <line x1="292" y1="336" x2="380" y2="336" stroke="#4ade80" stroke-width="24" stroke-linecap="round"/>
